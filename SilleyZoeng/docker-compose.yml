services:
  ollama:
    image: ollama/ollama:latest
    container_name: eval-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  promptfoo-ui:
    image: promptfoo/promptfoo:latest
    container_name: eval-promptfoo-ui
    ports:
      - "3000:3000"
    volumes:
      - ./output:/app/output
    environment:
      - PROMPTFOO_SHARE_STORE_PATH=/app/output
    command: ["view", "--host", "0.0.0.0", "--port", "3000"]
    restart: unless-stopped

volumes:
  ollama_data:
