  # === Negative cases (15 - should NOT trigger any skill) ===
  - description: "negative: weather question"
    vars:
      prompt: "What is the weather today in Shanghai?"
      expected_skill: "none"
      should_trigger: "false"
  - description: "negative: Python script"
    vars:
      prompt: "帮我写一个Python脚本来处理CSV文件"
      expected_skill: "none"
