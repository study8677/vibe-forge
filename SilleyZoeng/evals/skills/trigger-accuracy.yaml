description: "Skill Trigger Accuracy — tests whether the correct skill activates for each user message"

providers:
  - id: "file://src/providers/claude-skill.provider.ts"
    label: "claude-skill-trigger"
    config:
      mode: trigger

defaultTest:
  assert:
    - type: "file://src/assertions/trigger-accuracy.ts"

tests:
  # === deploy skill (8 cases) ===
  - description: "deploy: '帮我部署一下前端'"
    vars:
      prompt: "帮我部署一下前端"
      expected_skill: "deploy"
      should_trigger: "true"
  - description: "deploy: 'deploy the latest changes'"
    vars:
      prompt: "deploy the latest changes"
      expected_skill: "deploy"
      should_trigger: "true"
  - description: "deploy: '发布到服务器'"
    vars:
      prompt: "发布到服务器"
      expected_skill: "deploy"
      should_trigger: "true"
  - description: "deploy: '推送并部署'"
    vars:
      prompt: "推送并部署"
      expected_skill: "deploy"
      should_trigger: "true"
  - description: "deploy: 'redeploy the rust backend'"
    vars:
      prompt: "redeploy the rust backend"
      expected_skill: "deploy"
      should_trigger: "true"
  - description: "deploy: '更新服务器上的代码'"
    vars:
      prompt: "更新服务器上的代码"
      expected_skill: "deploy"
      should_trigger: "true"
  - description: "deploy: '上线新版本'"
    vars:
      prompt: "上线新版本"
      expected_skill: "deploy"
      should_trigger: "true"
  - description: "deploy: '重新部署billing服务'"
    vars:
      prompt: "重新部署billing服务"
      expected_skill: "deploy"
      should_trigger: "true"

  # === ops-report skill (8 cases) ===
  - description: "ops-report: '给我看看今天的运营数据'"
