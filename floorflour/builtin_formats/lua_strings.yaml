name: "Lua String Table"
description: "Lua files with TEXT[\"key\"] = \"value\" pattern"
extensions: [".lua"]
encoding: "utf-8"
type: "regex"
regex:
  patterns:
    - pattern: 'TEXT\["([^"]+)"\]\s*=\s*"([^"]*)"'
      key_group: 1
      value_group: 2
      context_lines: 2
  replacement: 'TEXT["{key}"] = "{value}"'
