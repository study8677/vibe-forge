[plugin]
name = "example-native"
version = "0.1.0"
api_version = "1"
authors = ["Stevessr Contributors"]
description = "Example native plugin"
runtime = "native"

[permissions]
database = true

[settings]
enabled = { type = "bool", default = true, description = "Enable this plugin" }
greeting = { type = "string", default = "Hello from native plugin!", description = "Greeting message" }
